name: Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack plugin
        run: npx streamdeck pack de.boriskemper.sonos-controller.sdPlugin --force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: de.boriskemper.sonos-controller.streamDeckPlugin
