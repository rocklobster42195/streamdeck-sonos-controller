name: Bug Report
description: Something is not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: My Sonos speaker and computer are on the same subnet
          required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected action
      options:
        - Play / Pause Key
        - Track Dial
        - Volume Dial
        - Favorites Dial
        - Panorama Particles Dial
        - Volume Key
        - Playback Control Key
        - Play Favorite Key
        - Other / General
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Open Stream Deck software → right-click the plugin → "View Logs". Remove sensitive data (IP addresses etc.).
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Plugin version:
        - Stream Deck software version:
        - Stream Deck model (e.g. Stream Deck+):
        - Sonos speaker model:
        - OS (Windows / macOS):
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
