name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been requested before
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Play / Pause Key
        - Track Dial
        - Volume Dial
        - Favorites Dial
        - Panorama Particles Dial
        - Volume Key
        - Playback Control Key
        - Play Favorite Key
        - New action
        - Other / General
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What can't you do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: What workarounds do you use today?

  - type: textarea
    id: additional
    attributes:
      label: Additional context (optional)
