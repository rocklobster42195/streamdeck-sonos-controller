<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Queue Navigator Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="i18n.js" defer></script>
  <script src="sdpi-components.js" defer></script>
  <style>
    :root { color-scheme: dark; }
    .hint { font-size: 11px; color: #888; line-height: 1.4; }
  </style>
</head>
<body>
  <sdpi-item label="SONOS device" data-i18n="sonos_device">
    <sdpi-select setting="deviceIp" datasource="get-devices" loading="Fetching devices…" data-i18n-loading="fetching_devices" hot-reload>
    </sdpi-select>
  </sdpi-item>

  <sdpi-item label="View mode" data-i18n="view_mode">
    <sdpi-select setting="viewMode">
      <option value="cover" data-i18n="view_cover">Cover + track info</option>
      <option value="list" data-i18n="view_list">Queue list (3 tracks)</option>
    </sdpi-select>
  </sdpi-item>

  <sdpi-item label="">
    <sdpi-item-value class="hint" data-i18n-html="queue_hint">
      Rotate to browse the current queue.<br>
      Press to seek to the browsed track.<br>
      Touch to jump back to the playing track.
    </sdpi-item-value>
  </sdpi-item>
</body>
</html>
