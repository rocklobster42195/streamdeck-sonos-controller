<!DOCTYPE html>
<html>
  <head lang="en">
    <title>SONOS Playback Control Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
  </head>

  <body>
    <sdpi-item label="SONOS device">
        <sdpi-select
            setting="deviceIp"
            datasource="get-devices"
            loading="Fetching devices..."
            hot-reload>
            <!-- Placeholder für die Geräteliste -->
            <option value="">-- Choose Device --</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Command">
    <sdpi-select setting="command">
        <option value="" selected hidden>-- Select Command --</option>
        <option value="next">Next Track</option>
        <option value="previous">Previous Track</option>
        <option value="shuffle">Toggle Shuffle</option>
        <option value="repeat">Toggle Repeat</option>
    </sdpi-select>
</sdpi-item>
  </body>
</html>
