<!DOCTYPE html>
<html lang="en">

<head>
  <title>Play Key Settings</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="i18n.js" defer></script>
  <script src="sdpi-components.js" defer></script>
  <style>:root { color-scheme: dark; } #battery-row { display: none; }</style>
</head>

<body>
  <sdpi-item label="SONOS device" data-i18n="sonos_device">
    <sdpi-select setting="deviceIp" datasource="get-devices" loading="Fetching devices…" data-i18n-loading="fetching_devices" hot-reload>
    </sdpi-select>
  </sdpi-item>
  <sdpi-item label="Device Name" data-i18n="device_name">
    <sdpi-checkbox setting="showDeviceName" value="true"></sdpi-checkbox>
  </sdpi-item>
  <sdpi-item label="Cover Art" data-i18n="cover_art">
    <sdpi-checkbox setting="showCoverArt" value="true"></sdpi-checkbox>
  </sdpi-item>
  <sdpi-item label="Title (Artist)" data-i18n="title_artist">
    <sdpi-checkbox setting="showTrackTitle" value="true"></sdpi-checkbox>
  </sdpi-item>
  <div id="battery-row">
    <sdpi-item label="Battery Indicator" data-i18n="battery_indicator">
      <sdpi-checkbox setting="showBattery"></sdpi-checkbox>
    </sdpi-item>
  </div>
  <sdpi-item label="FontSize" data-i18n="font_size">
    <sdpi-range setting="fontSize" min="10" max="20" step="1" showlabels></sdpi-range>
  </sdpi-item>
  <sdpi-item label="FontColor" data-i18n="font_color">
    <sdpi-color setting="fontColor"></sdpi-color>
  </sdpi-item>

  <script>
    var batteryRow = document.getElementById('battery-row');

    document.addEventListener('sendToPropertyInspector', function (e) {
      var d = e && e.detail;
      if (d && d.event === 'device-info') {
        batteryRow.style.display = d.hasBattery ? '' : 'none';
      }
    });

    (function tryClient(n) {
      if (window.streamDeckClient) {
        streamDeckClient.sendToPlugin({ event: 'get-device-info' });
      } else if (n > 0) {
        setTimeout(function () { tryClient(n - 1); }, 100);
      }
    }(20));
  </script>
</body>

</html>
