<!DOCTYPE html>
<html>

<head lang="en">
  <title>Play Key Settings</title>
  <meta charset="utf-8" />
  <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
</head>

<body>
  <sdpi-item label="SONOS device">
    <sdpi-select setting="deviceIp" datasource="get-devices" loading="Fetching devices..." hot-reload>
    </sdpi-select>
  </sdpi-item>
  <sdpi-item label="Device Name">
    <sdpi-checkbox setting="showDeviceName" value="true"></sdpi-checkbox>
  </sdpi-item>
  <sdpi-item label="Cover Art">
    <sdpi-checkbox setting="showCoverArt" value="true"></sdpi-checkbox>
  </sdpi-item>
  <sdpi-item label="Title (Artist)">
    <sdpi-checkbox setting="showTrackTitle" value="true"></sdpi-checkbox>
  </sdpi-item>
  <sdpi-item label="FontSize">
    <sdpi-range
        setting="fontSize"
        min="10"
        max="20"
        step="1"
        showlabels>
    </sdpi-range>
</sdpi-item>
  <sdpi-item label="FontColor">
    <sdpi-color setting="fontColor"></sdpi-color>
  </sdpi-item>
</body>

</html>
