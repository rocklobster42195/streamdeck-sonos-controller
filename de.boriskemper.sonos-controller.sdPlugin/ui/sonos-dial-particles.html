<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panorama Particles Settings</title>
    <script src="i18n.js" defer></script>
    <script src="sdpi-components.js" defer></script>
    <style>:root { color-scheme: dark; }</style>
  </head>

  <body>
    <sdpi-item label="SONOS device" data-i18n="sonos_device">
      <sdpi-select setting="deviceIp" datasource="get-devices" loading="Fetching devices…" data-i18n-loading="fetching_devices" hot-reload>
      </sdpi-select>
    </sdpi-item>

    <sdpi-item id="colorItem" label="Particle color" data-i18n="particle_color">
      <sdpi-color setting="staticColor"></sdpi-color>
    </sdpi-item>

    <sdpi-item label="Track info" data-i18n="track_info">
      <sdpi-checkbox setting="showTrackInfo"></sdpi-checkbox>
    </sdpi-item>

    <script>
      function setColorVisible(deviceIp) {
        document.getElementById('colorItem').style.display = deviceIp ? 'none' : '';
      }

      // Initial state when PI opens and receives current settings.
      document.addEventListener('settingsDidChange', (ev) => setColorVisible(ev.detail?.deviceIp));

      // Immediate response to device select changes.
      document.addEventListener('change', (ev) => {
        if (ev.target?.getAttribute?.('setting') === 'deviceIp') {
          setColorVisible(ev.detail?.value ?? ev.target?.value);
        }
      });
    </script>
  </body>
</html>
